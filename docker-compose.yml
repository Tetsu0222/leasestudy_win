services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: leasestudy-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./db:/scripts:ro
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -l 3 || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: leasestudy-app
    working_dir: /workspace/src/LeaseStudyApp
    environment:
      LEASE_SQLSERVER_CONNECTION: Server=mssql,1433;Database=LeaseStudyDb;User ID=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      NUGET_PACKAGES: /workspace/.nuget-cache
    volumes:
      - .:/workspace
    depends_on:
      mssql:
        condition: service_healthy
    stdin_open: true
    tty: true
    profiles: ["app"]

volumes:
  mssql-data:
